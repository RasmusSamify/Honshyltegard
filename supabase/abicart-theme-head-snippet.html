<!--
  Script som ska klistras in i Abicart Nordic-temats <head>.
  Funktioner:
    1) Läser ?load_cart=TOKEN, sätter sessionen i SPA:ns Redux store och
       laddar sedan om kassan RENT (utan param) — vilket speglar exakt det
       en manuell refresh gör (som bevisligen får varukorgen att dyka upp).
    2) Klass-oberoende dämpning av Abicarts "Fel"-modal under första laddningen.
    3) Efter order-completion redirectar tillbaka till widgeten så
       confirmPayment kan köras automatiskt.

  Installation:
    Abicart admin → Mall → Nordic v1.1 → HTML/CSS → <head>-sektion.

  Bakgrund (varför reload behövs):
    Vid första landningen på /kassa/?load_cart=TOKEN har SPA:n redan renderat
    en TOM varukorg innan vår setSession hinner verka. fetchSessionData ensam
    triggar ingen omritning av order/varukorg-vyn → kunden ser tom korg.
    En manuell refresh bootar SPA:n på nytt med sessionen redan aktiv (cookie)
    → korgen renderas korrekt. Vi automatiserar den refreshen.
-->
<script>
(function(){
  // Widget-URL att redirecta tillbaka till efter betalning
  var BOOKING_RETURN_URL = 'https://rasmussamify.github.io/Honshyltegard/';

  var urlParams = new URLSearchParams(window.location.search);
  var sessionFromUrl = urlParams.get('load_cart');

  // ── Klass-oberoende fel-modal-dämpning ──
  // Abicart har bytt klassnamn på sin SystemError-modal, så den gamla
  // selektorn (.tws-checkout--system-error-modal) matchar inte längre.
  // Vi matchar istället på modalens INNEHÅLL (feltext sv/en/de) inom
  // element som ser ut som modaler/dialoger. Körs bara i ett kort fönster
  // direkt efter landningen, så vi inte döljer äkta fel senare i flödet.
  function installModalSuppressor(durationMs){
    var until = Date.now() + durationMs;
    var ERR_RE = /ett fel har inträffat|an error (has )?occurred|ein fehler|försök igen|try again|erneut versuchen/i;
    var hide = function(){
      if (Date.now() > until) return;
      var sel = '.tws-checkout--system-error-modal, .tws-modal, [class*="system-error"],'
              + ' [class*="error-modal"], [class*="modal"], [role="dialog"], [role="alertdialog"]';
      document.querySelectorAll(sel).forEach(function(m){
        if (ERR_RE.test(m.textContent || '')) {
          m.style.display = 'none';
          m.setAttribute('aria-hidden', 'true');
        }
      });
      document.querySelectorAll('.modal-backdrop, [class*="backdrop"], [class*="overlay"]').forEach(function(b){
        // Ta bara bort backdrops som faktiskt blockerar (synliga overlays)
        var cs = window.getComputedStyle(b);
        if (cs && cs.display !== 'none' && (cs.position === 'fixed' || cs.position === 'absolute')) {
          b.style.display = 'none';
        }
      });
    };
    var mo = new MutationObserver(hide);
    try { mo.observe(document.documentElement, { childList: true, subtree: true }); } catch(_) {}
    var iv = setInterval(hide, 250);
    setTimeout(function(){ try { mo.disconnect(); } catch(_) {} clearInterval(iv); hide(); }, durationMs);
    hide();
  }

  // Vänta tills SPA:ns Redux store + actions finns (de bootas async, ofta
  // EFTER window 'load'). Slänger ALDRIG token innan store är redo.
  function whenReady(cb, attempts){
    attempts = attempts || 0;
    var store = window.twsReduxStore;
    var actions = window.twsCore && window.twsCore.actions;
    if (store && actions) { cb(store, actions); return; }
    if (attempts >= 60) { cb(null, null); return; } // ~15s tak
    setTimeout(function(){ whenReady(cb, attempts + 1); }, 250);
  }

  window.addEventListener('load', function(){
    // ── Del 1: load_cart → setSession → ren reload (speglar manuell refresh) ──
    if (sessionFromUrl) {
      installModalSuppressor(9000);

      // Svälj 9003/1006-rejections från Abicarts init under injektionen
      var rejectionHandler = function(e){
        var r = e.reason;
        if (r && typeof r === 'object' && (r.code === 9003 || r.code === 1006)) {
          console.warn('[HHG] suppressed Abicart init rejection:', r);
          e.preventDefault();
        }
      };
      window.addEventListener('unhandledrejection', rejectionHandler);
      setTimeout(function(){ window.removeEventListener('unhandledrejection', rejectionHandler); }, 9000);

      var reloadClean = function(){
        // Ladda om utan ?load_cart. SPA:n bootar då med den nu AKTIVA
        // sessionen och renderar varukorgen korrekt — precis som en manuell
        // refresh. Guard mot loop: flaggan sätts före reload och städas på
        // den rena laddningen (else-grenen nedan).
        if (sessionStorage.getItem('_loadCartReloaded')) return;
        sessionStorage.setItem('_loadCartReloaded', '1');
        window.location.replace(window.location.pathname);
      };

      whenReady(function(store, actions){
        if (!store || !actions) {
          // Kunde aldrig nå store. Sista utväg: ladda om EN gång med param
          // kvar (token finns då fortfarande i URL för nästa försök).
          if (!sessionStorage.getItem('_loadCartReloaded')) {
            sessionStorage.setItem('_loadCartReloaded', '1');
            window.location.reload();
          }
          return;
        }
        try { store.dispatch(actions.setSession(sessionFromUrl)); } catch(_) {}
        // Vänta in att sessionen round-trippat (cookie/persist skrivs) innan
        // vi laddar om — annars kan reloaden tappa sessionen.
        var p;
        try { p = store.dispatch(actions.fetchSessionData()); } catch(_) {}
        if (p && typeof p.then === 'function') {
          p.then(reloadClean, reloadClean);
        } else {
          setTimeout(reloadClean, 800);
        }
      });
    } else {
      // Ren kassa-laddning (efter vår reload, eller vanlig navigering):
      // städa loop-flaggan. SPA:n renderar varukorgen från aktiv session.
      sessionStorage.removeItem('_loadCartReloaded');
    }

    // ── Del 2: efter order-completion, redirecta tillbaka till widgeten ──
    var rstore = window.twsReduxStore;
    if (!rstore) return;
    var lastRoute = null;
    rstore.subscribe(function(){
      try {
        var s = rstore.getState();
        var route = s && s.router && s.router.location && s.router.location.pathname;
        if (!route || route === lastRoute) return;
        lastRoute = route;
        if (/order.?complete|thank|tack/i.test(route)) {
          var orderUid = s.order && s.order.uid;
          var u = BOOKING_RETURN_URL + (BOOKING_RETURN_URL.indexOf('?') === -1 ? '?' : '&') + 'abicart_order=' + (orderUid || '');
          setTimeout(function(){ window.location.href = u; }, 1200);
        }
      } catch(_) {}
    });
  });
})();
</script>
