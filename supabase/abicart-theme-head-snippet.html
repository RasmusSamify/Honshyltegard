<!--
  Script som ska klistras in i Abicart Nordic-temats <head>.
  Funktioner:
    1) Läser ?load_cart=TOKEN och injicerar sessionen i SPA:ns Redux store
       (nuvarande, fungerande lösning — flyttar kunden direkt till kassan).
    2) Efter order-completion redirectar tillbaka till widgeten så
       confirmPayment kan köras automatiskt.

  Installation:
    Abicart admin → Mall → Nordic v1.1 → HTML/CSS → <head>-sektion.
-->
<script>
(function(){
  // Widget-URL att redirecta tillbaka till efter betalning
  var BOOKING_RETURN_URL = 'https://rasmussamify.github.io/Honshyltegard/';

  // ── Del 1: load_cart ──
  var urlParams = new URLSearchParams(window.location.search);
  var sessionFromUrl = urlParams.get('load_cart');
  if (sessionFromUrl) sessionStorage.setItem('_loadCart', sessionFromUrl);

  window.addEventListener('load', function(){
    var token = sessionStorage.getItem('_loadCart');
    if (token) {
      sessionStorage.removeItem('_loadCart');

      // Abicart SPA kör flera interna dispatches direkt efter setSession
      // (fetchSessionData, fetchCart, fetchOrder m.fl.). Efter en nyligen
      // skapad session misslyckas en eller flera av dessa med 9003/1006 på
      // grund av race conditions på backend, vilket triggar SystemError-modalen.
      // Vi kan inte catcha alla dispatches men vi kan dölja modalen när den
      // dyker upp de första sekunderna efter redirecten.
      var suppressUntil = Date.now() + 5000;
      var hideErrorModals = function(){
        if (Date.now() > suppressUntil) return;
        document.querySelectorAll('.tws-checkout--system-error-modal').forEach(function(m){
          m.style.display = 'none';
          m.setAttribute('aria-hidden', 'true');
        });
        // Dolda backdrop:er kan blockera interaktion — ta bort dem också
        document.querySelectorAll('.modal-backdrop').forEach(function(b){
          if (b.style.display !== 'none') b.style.display = 'none';
        });
      };
      var mo = new MutationObserver(hideErrorModals);
      mo.observe(document.body, { childList: true, subtree: true });
      setTimeout(function(){ mo.disconnect(); hideErrorModals(); }, 5000);

      // Svälj unhandled promise rejections från Abicarts init (9003, 1006)
      // så de inte dyker upp som fel i konsollen.
      var rejectionHandler = function(e){
        if (Date.now() > suppressUntil) return;
        var r = e.reason;
        if (r && typeof r === 'object' && (r.code === 9003 || r.code === 1006)) {
          console.warn('[HHG] suppressed Abicart init rejection:', r);
          e.preventDefault();
        }
      };
      window.addEventListener('unhandledrejection', rejectionHandler);
      setTimeout(function(){ window.removeEventListener('unhandledrejection', rejectionHandler); }, 5000);

      var store = window.twsReduxStore;
      var actions = window.twsCore && window.twsCore.actions;
      if (store && actions) {
        // Abicart-rekommendation: hoppa över goToThemeRoute om vi redan är på
        // /kassa eller /checkout. Att dispatch:a route-byte på en sida vi redan
        // är på triggar onödiga interna fetch-anrop som racar mot en nyligen
        // skapad order — vilket är det som ger 9003/1006-felen.
        var afterFetch = function(){
          try { window.history.replaceState({}, document.title, window.location.pathname); } catch(_) {}
          var path = window.location.pathname || '';
          var alreadyAtCheckout = path.indexOf('/kassa') !== -1 || path.indexOf('/checkout') !== -1;
          if (!alreadyAtCheckout) {
            try { store.dispatch(actions.goToThemeRoute('checkout')); } catch(_) {}
          }
        };
        store.dispatch(actions.setSession(token));
        store.dispatch(actions.fetchSessionData())
          .then(afterFetch)
          .catch(function(err){
            console.warn('[HHG] fetchSessionData rejected (ignored):', err);
            afterFetch();
          });
      }
    }

    // ── Del 2: efter order-completion, redirecta tillbaka till widgeten ──
    // Prenumererar på Redux store; om routen blir 'orderComplete' / 'thankyou',
    // hämtar order-UID och skickar kunden tillbaka till widgeten med query-param.
    var rstore = window.twsReduxStore;
    if (!rstore) return;
    var lastRoute = null;
    rstore.subscribe(function(){
      try {
        var s = rstore.getState();
        var route = s && s.router && s.router.location && s.router.location.pathname;
        if (!route || route === lastRoute) return;
        lastRoute = route;
        // Abicart Nordic använder ofta /ordercomplete eller /thankyou
        if (/order.?complete|thank|tack/i.test(route)) {
          var orderUid = s.order && s.order.uid;
          var u = BOOKING_RETURN_URL + (BOOKING_RETURN_URL.indexOf('?') === -1 ? '?' : '&') + 'abicart_order=' + (orderUid || '');
          setTimeout(function(){ window.location.href = u; }, 1200);
        }
      } catch(_) {}
    });
  });
})();
</script>
